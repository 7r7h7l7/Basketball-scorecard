<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="index.css">
    </head>
    <body>
        <div class="scoreboard">
            <div class="team1">
                <p>HOME</p>
                <div class="board" id="homeScore">0</div>
                <div class="btn">
                    <button onclick="addValue(1, 1)">+1</button>
                    <button onclick="addValue(2, 1)">+2</button>
                    <button onclick="addValue(3, 1)">+3</button>
                </div>
            </div>
            <div class="team2">
                <p>GUEST</p>
                <div class="board" id="guestScore">0</div>
                <div class="btn">
                    <button onclick="addValue(1, 2)">+1</button>
                    <button onclick="addValue(2, 2)">+2</button>
                    <button onclick="addValue(3, 2)">+3</button>
                </div>
            </div>
        </div>
        <script src="index.js"></script>
    </body>
</html
